name: Build ARM32

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq ninja-build bison flex gcc-arm-none-eabi 2>&1 | tail -1
    
    - name: Patch toolchain
      run: |
        sed -i 's/require_program.*windmc)/#windmc/' toolchain-gcc.cmake
        sed -i 's/require_program.*windres)/#windres/' toolchain-gcc.cmake
        sed -i 's/require_program.*dlltool)/#dlltool/' toolchain-gcc.cmake
    
    - name: CMake ARM
      run: |
        mkdir build && cd build
        cmake .. -DARCH=arm -GNinja           -DCMAKE_MAKE_PROGRAM=$(which ninja)           -DCMAKE_TOOLCHAIN_FILE=../toolchain-gcc.cmake           -DCMAKE_C_COMPILER=arm-none-eabi-gcc           -DCMAKE_CXX_COMPILER=arm-none-eabi-g++           -DMINGW_TOOLCHAIN_PREFIX=""           -DCMAKE_C_FLAGS="--specs=nosys.specs -Wno-error"           -DCMAKE_CXX_FLAGS="--specs=nosys.specs -Wno-error"           -DCMAKE_EXE_LINKER_FLAGS="--specs=nosys.specs" 2>&1 | tail -5
    
    - name: Build kernel
      run: |
        cd build
        ninja ntoskrnl hal 2>&1 | tail -20
        find . -name "ntoskrnl*" -o -name "*hal*"
    
    - uses: actions/upload-artifact@v4
      with:
        name: arm32-kernel
        path: |
          build/**/ntoskrnl*
          build/**/hal*
          build/**/*.a
